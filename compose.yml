services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    ports:
      - "8123:8123"
      - "9440:9000"
    environment:
      CLICKHOUSE_DB: agentlore
      CLICKHOUSE_USER: agentlore
      CLICKHOUSE_PASSWORD: agentlore
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse-data:
